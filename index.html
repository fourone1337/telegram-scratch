<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Скретч-Лотерея</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f8f9fa;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    button {
      display: block;
      margin: 15px auto;
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background-color: #007bff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background-color: #0056b3;
    }
    #status {
      margin-top: 25px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>🎟️ Скретч-Лотерея</h1>

  <button id="connect">🔗 Подключить кошелёк</button>
  <button id="buy" disabled>💸 Купить билет за 1 TON</button>

  <div id="status">Кошелёк не подключён.</div>

  <script type="module">
    import { TonConnect } from "https://unpkg.com/@tonconnect/sdk@latest";

    const tonConnect = new TonConnect();
    const connectBtn = document.getElementById("connect");
    const buyBtn = document.getElementById("buy");
    const status = document.getElementById("status");

    const WALLET_ADDRESS = "EQC..."; // ← Замени на свой реальный TON-адрес

    // Проверяем, открыт ли WebApp внутри Telegram
    const isTelegramWebApp = !!window.Telegram?.WebApp;
    if (!isTelegramWebApp) {
      status.textContent = "❌ Откройте игру через Telegram WebApp.";
      connectBtn.disabled = true;
    }

    // Кнопка подключения
    connectBtn.onclick = async () => {
      try {
        await tonConnect.connectWallet();
        const wallet = tonConnect.wallet;
        status.textContent = "✅ Кошелёк: " + wallet.account.address;
        buyBtn.disabled = false;
      } catch (error) {
        console.error(error);
        status.textContent = "❌ Не удалось подключить кошелёк.";
      }
    };

    // Кнопка оплаты
    buyBtn.onclick = async () => {
      const tx = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [
          {
            address: WALLET_ADDRESS,
            amount: (1 * 1e9).toString()
          }
        ]
      };

      try {
        await tonConnect.sendTransaction(tx);
        status.textContent = "📤 Транзакция отправлена. Ожидаем подтверждение.";
      } catch (error) {
        console.error(error);
        status.textContent = "❌ Транзакция отменена.";
      }
    };
  </script>
</body>
</html>
