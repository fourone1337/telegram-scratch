<!doctype html><html><head><meta charset="utf-8"><title>Scratch</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head><body>
  <h1>Scratch 🧪</h1>
  <button id="connect">🔗 Подключить кошелёк</button>
  <button id="buy" disabled>💸 Купить билет за 1 TON</button>
  <p id="status">Статус: –</p>

  <script type="module">
    console.log("Telegram WebApp?", window.Telegram?.WebApp);
    console.log("InitData:", window.Telegram?.WebApp?.initDataUnsafe);

    import { TonConnect } from "https://unpkg.com/@tonconnect/sdk@latest";
    const tonConnect = new TonConnect();
    const status = document.getElementById('status');
    const connect = document.getElementById('connect');
    const buy = document.getElementById('buy');

    connect.onclick = async () => {
      console.log("Connect clicked");
      try {
        await tonConnect.connectWallet();
        console.log("Wallet:", tonConnect.wallet);
        status.textContent = '✅ ' + tonConnect.wallet.account.address;
        buy.disabled = false;
      } catch(e) {
        console.error(e);
        status.textContent = '❌ Ошибка подключения';
      }
    };

    buy.onclick = async () => {
      try {
        const tx = {
          validUntil: Math.floor(Date.now()/1000)+300,
          messages: [{ address: "EQC...", amount: "1000000000" }]
        };
        console.log("Sending tx", tx);
        await tonConnect.sendTransaction(tx);
        status.textContent = "Транзакция отправлена";
      } catch(e) {
        console.error(e);
        status.textContent = "❌ Ошибка транзакции";
      }
    };
  </script>
</body></html>
